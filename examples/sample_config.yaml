plant_id: "sortient-demo-plant"
data_ingestion:
  source: "simulated"
  refresh_interval_ms: 200
  max_batch_size: 512
  metadata:
    shift: "day"
    supervisor: "Operations"
robotics:
  protocol: "ros2"
  endpoint: "ws://localhost:9090"
  namespace: "sortient/demo"
  qos:
    max_queue_size: 4000
    heartbeat_interval_s: 0.25
    ack_timeout_s: 1.0
    retry_attempts: 5
    jitter_tolerance_ms: 15
  safety:
    handshake_required: true
    handshake_timeout_s: 2.5
    emergency_stop_topic: "/sortient/safety/stop"
    max_payload_kg: 18.0
    keepout_zones:
      - name: "maintenance"
        x: 4.0
        y: 1.5
        z: 2.0
        radius: 1.2
    allowed_joint_ranges:
      joint_1: [-1.57, 1.57]
      joint_2: [-1.2, 1.2]
      joint_3: [-1.5, 1.5]
analytics:
  enable_oee_tracking: true
  enable_predictive_maintenance: true
  enable_prometheus_export: false
  sliding_window_minutes: 15
digital_twin:
  enabled: true
  default_speed_mps: 1.6
  energy_coefficient_kw_per_item: 0.045
  export_path: "artifacts/twin_report.json"
materials_catalog: "materials_catalog.csv"
